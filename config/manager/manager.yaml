---
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-system
  labels:
    app.kubernetes.io/name: nvidia-runtime-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvidia-runtime-operator
  namespace: nvidia-system
  labels:
    app.kubernetes.io/name: nvidia-runtime-operator
    app.kubernetes.io/component: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-runtime-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-runtime-operator
    spec:
      serviceAccountName: nvidia-runtime-operator
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 10
      containers:
      - name: manager
        image: ghcr.io/nissandutta31-maker/nvidia-runtime-operator:latest
        imagePullPolicy: IfNotPresent
        command:
        - /manager
        args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
