---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: runtimepackages.runtime.nvidia.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: runtime.nvidia.com
  names:
    kind: RuntimePackage
    listKind: RuntimePackageList
    plural: runtimepackages
    singular: runtimepackage
    shortNames:
    - rtpkg
    categories:
    - nvidia
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Package
      type: string
      jsonPath: .spec.packageName
    - name: Version
      type: string
      jsonPath: .spec.version
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Ready
      type: integer
      jsonPath: .status.readyNodes
    - name: Total
      type: integer
      jsonPath: .status.totalNodes
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        description: RuntimePackage manages the lifecycle of a GPU runtime package
          across Kubernetes nodes. The operator ensures that each targeted node runs
          the desired version via an installer DaemonSet.
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - packageName
            - version
            - targetArchitectures
            properties:
              packageName:
                description: Name of the GPU runtime package (e.g. nvidia-container-toolkit).
                type: string
                minLength: 1
              version:
                description: Desired semver version of the package.
                type: string
                pattern: ^\d+\.\d+\.\d+.*$
              targetArchitectures:
                description: GPU architectures this package targets.
                type: array
                minItems: 1
                items:
                  type: string
                  enum:
                  - A100
                  - H100
                  - GB200
                  - GB300
              nodeSelector:
                description: Label selector restricting installation to matching nodes.
                type: object
                additionalProperties:
                  type: string
              autoUpgrade:
                description: Enable in-place upgrades when the Version field changes.
                type: boolean
                default: false
              validationScript:
                description: Optional shell script executed post-install to verify
                  the package (e.g. runs nvidia-smi checks).
                type: string
          status:
            type: object
            properties:
              phase:
                description: Current lifecycle phase.
                type: string
                enum:
                - Pending
                - Installing
                - Ready
                - Upgrading
                - Failed
              installedVersion:
                description: Version last successfully installed.
                type: string
              readyNodes:
                description: Count of nodes with the package installed and healthy.
                type: integer
                format: int32
              totalNodes:
                description: Total count of nodes targeted by NodeSelector.
                type: integer
                format: int32
              lastUpdateTime:
                description: Last time the operator wrote to this status.
                type: string
                format: date-time
              conditions:
                description: Latest observations of the package's state.
                type: array
                listType: map
                listMapKey: type
                items:
                  type: object
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  properties:
                    lastTransitionTime:
                      type: string
                      format: date-time
                    message:
                      type: string
                      maxLength: 32768
                    observedGeneration:
                      type: integer
                      format: int64
                      minimum: 0
                    reason:
                      type: string
                      maxLength: 1024
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$|^$
                    status:
                      type: string
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                    type:
                      type: string
                      maxLength: 316
