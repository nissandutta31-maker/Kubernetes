name: GPU Runtime Operator CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-vet-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nvidia-dgx-cloud-k8s-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: nvidia-dgx-cloud-k8s-demo/go.mod

      - name: Lint
        run: make lint

      - name: Vet
        run: make vet

      - name: Unit and integration tests
        run: make test

  kind-smoke:
    runs-on: ubuntu-latest
    needs: lint-vet-test
    defaults:
      run:
        working-directory: nvidia-dgx-cloud-k8s-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: nvidia-dgx-cloud-k8s-demo/go.mod

      - name: Create KinD cluster
        uses: helm/kind-action@v1.12.0

      - name: Build controller image
        run: make docker-build IMG=gpu-runtime-operator:ci

      - name: Load image into KinD
        run: kind load docker-image gpu-runtime-operator:ci

      - name: Deploy operator
        run: make deploy IMG=gpu-runtime-operator:ci

      - name: Wait for controller
        run: kubectl -n nvidia-dgx-cloud-k8s-demo-system wait --for=condition=available deployment/nvidia-dgx-cloud-k8s-demo-controller-manager --timeout=180s

      - name: Apply sample runtime
        run: kubectl apply -f config/samples/runtime_v1alpha1_gpuruntime.yaml

      - name: Verify managed resources
        run: |
          kubectl get configmap -n default gpuruntime-sample-runtime-config
          kubectl get daemonset -n default gpuruntime-sample-device-plugin
