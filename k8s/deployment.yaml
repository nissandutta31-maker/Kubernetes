apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvidia-demo-app
  namespace: nvidia-runtime-demo
  labels:
    app: nvidia-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nvidia-demo-app
  template:
    metadata:
      labels:
        app: nvidia-demo-app
    spec:
      containers:
        - name: nvidia-demo-app
          image: nvidia-demo-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
